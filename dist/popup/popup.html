<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Mastodon Feed Listener</title><link rel="stylesheet" href="../styles/popup.css"></head><body><div class="container"><header><h1>Mastodon Feed Listener</h1></header><section class="login-section" id="login-section"><h2>登录 Mastodon</h2><div class="form-group"><label for="login-instance">实例地址:</label> <input id="login-instance" placeholder="mastodon.social"></div><button id="login-btn" class="btn btn-primary">登录</button></section><section class="user-section" id="user-info" style="display: none;"><div class="user-profile"><img id="user-avatar" class="user-avatar" src="" alt="Avatar"><div class="user-details"><span id="user-name" class="user-name"></span> <span id="user-instance" class="user-instance"></span></div></div><button id="logout-btn" class="btn btn-secondary">退出登录</button></section><section class="post-section" id="post-section" style="display: none;"><h2>发布新 Feed</h2><div class="form-group"><textarea id="post-content" rows="4" placeholder="分享你的想法..." maxlength="500"></textarea><div class="char-counter"><span id="char-count">0/500</span></div></div><div class="media-upload-section"><div class="media-upload-header"><label for="media-input" class="media-upload-label"><span class="media-icon">📎</span> 添加媒体</label> <input type="file" id="media-input" accept="image/*,video/*,audio/*" multiple="multiple" hidden> <span class="media-hint">支持图片、视频、音频</span></div><div id="media-preview-container" class="media-preview-container"></div></div><div class="post-tools"><button id="emoji-btn" class="tool-btn" title="添加表情"><span>😊</span> 表情</button> <button id="poll-btn" class="tool-btn" title="添加投票"><span>📊</span> 投票</button></div><div id="emoji-picker" class="emoji-picker" style="display: none;"><div class="emoji-search"><input id="emoji-search" placeholder="搜索表情..."></div><div class="emoji-tabs" id="emoji-tabs"><button class="emoji-tab active" data-category="frequent">⭐ 常用</button> <button class="emoji-tab" data-category="people">👋 人物</button> <button class="emoji-tab" data-category="nature">🌸 自然</button> <button class="emoji-tab" data-category="food">🍕 食物</button> <button class="emoji-tab" data-category="activity">⚽ 活动</button> <button class="emoji-tab" data-category="travel">✈️ 旅行</button> <button class="emoji-tab" data-category="objects">💡 物体</button> <button class="emoji-tab" data-category="symbols">❤️ 符号</button> <button class="emoji-tab" data-category="flags">🚩 旗帜</button></div><div id="emoji-list" class="emoji-list"></div></div><div id="poll-section" class="poll-section" style="display: none;"><div class="poll-header"><h3>投票设置</h3><button id="remove-poll-btn" class="btn-remove-poll">×</button></div><div id="poll-options"><div class="poll-option"><input class="poll-option-input" placeholder="选项 1"></div><div class="poll-option"><input class="poll-option-input" placeholder="选项 2"></div></div><button id="add-poll-option-btn" class="btn-add-option">+ 添加选项</button><div class="poll-settings"><div class="poll-setting"><label>投票时长:</label> <select id="poll-expires"><option value="300">5 分钟</option><option value="1800">30 分钟</option><option value="3600">1 小时</option><option value="21600">6 小时</option><option value="86400" selected="selected">24 小时</option><option value="172800">2 天</option><option value="604800">7 天</option></select></div><div class="poll-setting"><label class="checkbox-label"><input type="checkbox" id="poll-multiple"> 多选</label></div><div class="poll-setting"><label class="checkbox-label"><input type="checkbox" id="poll-hide-totals"> 隐藏投票结果</label></div></div></div><div class="form-group cw-group"><label class="checkbox-label"><input type="checkbox" id="cw-toggle"> 添加内容警告 (CW)</label></div><div id="spoiler-wrapper" class="form-group" style="display: none;"><label for="spoiler-text">警告文本:</label> <input id="spoiler-text" placeholder="内容警告标题"></div><div class="form-group"><label for="post-visibility">可见性:</label> <select id="post-visibility"><option value="public">公开</option><option value="unlisted">不公开列表</option><option value="private">仅关注者</option><option value="direct">私信</option></select></div><button id="post-btn" class="btn btn-primary">发布</button><p class="hint">提示: 按 Ctrl/Cmd + Enter 快速发布</p></section><section class="settings-section"><h2>监控设置</h2><div class="form-group"><label for="mastodon-instance">Mastodon 实例:</label> <input id="mastodon-instance" placeholder="mastodon.social"></div><div class="form-group"><label for="mastodon-username">用户名:</label> <input id="mastodon-username" placeholder="username (不带 @)"></div><button id="add-account" class="btn btn-primary">添加监控</button></section><section class="monitored-section"><h2>已监控用户</h2><div id="monitored-list" class="monitored-list"></div></section><section class="notification-section"><h2>通知设置</h2><div class="form-group"><label class="checkbox-label"><input type="checkbox" id="notification-enabled"> 启用通知</label></div><div class="form-group"><label for="notification-method">通知方式:</label> <select id="notification-method"><option value="browser">浏览器通知</option><option value="api">API 通知 (Webhook)</option><option value="smtp">SMTP 邮件通知</option></select></div><div id="api-settings" class="settings-panel" style="display: none;"><h3>API 通知设置</h3><div class="form-group"><label for="api-url">API 地址:</label> <input id="api-url" placeholder="https://your-api-endpoint.com/webhook"></div><div class="form-group"><label for="api-key">API Key:</label> <input type="password" id="api-key" placeholder="Your API Key"></div></div><div id="smtp-settings" class="settings-panel" style="display: none;"><h3>SMTP 邮件设置</h3><div class="form-group"><label for="smtp-host">SMTP 服务器:</label> <input id="smtp-host" placeholder="smtp.example.com"></div><div class="form-group"><label for="smtp-port">端口:</label> <input type="number" id="smtp-port" value="587"></div><div class="form-group"><label class="checkbox-label"><input type="checkbox" id="smtp-secure"> 使用 SSL/TLS</label></div><div class="form-group"><label for="smtp-username">用户名:</label> <input id="smtp-username"></div><div class="form-group"><label for="smtp-password">密码:</label> <input type="password" id="smtp-password"></div><div class="form-group"><label for="smtp-from">发件人:</label> <input type="email" id="smtp-from" placeholder="from@example.com"></div><div class="form-group"><label for="smtp-to">收件人:</label> <input type="email" id="smtp-to" placeholder="to@example.com"></div></div></section><section class="poll-section"><h2>轮询设置</h2><div class="form-group"><label for="poll-interval">检查间隔 (分钟):</label> <input type="number" id="poll-interval" min="1" max="60" value="5"></div></section><section class="actions"><button id="save-settings" class="btn btn-primary">保存设置</button> <button id="check-now" class="btn btn-secondary">立即检查</button></section><footer><div id="status" class="status"></div></footer></div><script src="../popup/popup.js"></script></body></html>
