<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mastodon Feed Listener</title>
  <link rel="stylesheet" href="../styles/popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Mastodon Feed Listener</h1>
    </header>
    
    <section class="login-section" id="login-section">
      <h2>登录 Mastodon</h2>
      <div class="form-group">
        <label for="login-instance">实例地址:</label>
        <input type="text" id="login-instance" placeholder="mastodon.social">
      </div>
      <button id="login-btn" class="btn btn-primary">登录</button>
    </section>
    
    <section class="user-section" id="user-info" style="display: none;">
      <div class="user-profile">
        <img id="user-avatar" class="user-avatar" src="" alt="Avatar">
        <div class="user-details">
          <span id="user-name" class="user-name"></span>
          <span id="user-instance" class="user-instance"></span>
        </div>
      </div>
      <button id="logout-btn" class="btn btn-secondary">退出登录</button>
    </section>
    
    <section class="post-section" id="post-section" style="display: none;">
      <h2>发布新 Feed</h2>
      <div class="form-group">
        <textarea id="post-content" rows="4" placeholder="分享你的想法..." maxlength="500"></textarea>
        <div class="char-counter">
          <span id="char-count">0/500</span>
        </div>
      </div>
      <div class="form-group cw-group">
        <label class="checkbox-label">
          <input type="checkbox" id="cw-toggle">
          添加内容警告 (CW)
        </label>
      </div>
      <div id="spoiler-wrapper" class="form-group" style="display: none;">
        <label for="spoiler-text">警告文本:</label>
        <input type="text" id="spoiler-text" placeholder="内容警告标题">
      </div>
      <div class="form-group">
        <label for="post-visibility">可见性:</label>
        <select id="post-visibility">
          <option value="public">公开</option>
          <option value="unlisted">不公开列表</option>
          <option value="private">仅关注者</option>
          <option value="direct">私信</option>
        </select>
      </div>
      <button id="post-btn" class="btn btn-primary">发布</button>
      <p class="hint">提示: 按 Ctrl/Cmd + Enter 快速发布</p>
    </section>
    
    <section class="settings-section">
      <h2>监控设置</h2>
      
      <div class="form-group">
        <label for="mastodon-instance">Mastodon 实例:</label>
        <input type="text" id="mastodon-instance" placeholder="mastodon.social">
      </div>
      
      <div class="form-group">
        <label for="mastodon-username">用户名:</label>
        <input type="text" id="mastodon-username" placeholder="username (不带 @)">
      </div>
      
      <button id="add-account" class="btn btn-primary">添加监控</button>
    </section>
    
    <section class="monitored-section">
      <h2>已监控用户</h2>
      <div id="monitored-list" class="monitored-list"></div>
    </section>
    
    <section class="notification-section">
      <h2>通知设置</h2>
      
      <div class="form-group">
        <label class="checkbox-label">
          <input type="checkbox" id="notification-enabled">
          启用通知
        </label>
      </div>
      
      <div class="form-group">
        <label for="notification-method">通知方式:</label>
        <select id="notification-method">
          <option value="browser">浏览器通知</option>
          <option value="api">API 通知 (Webhook)</option>
          <option value="smtp">SMTP 邮件通知</option>
        </select>
      </div>
      
      <div id="api-settings" class="settings-panel" style="display: none;">
        <h3>API 通知设置</h3>
        <div class="form-group">
          <label for="api-url">API 地址:</label>
          <input type="text" id="api-url" placeholder="https://your-api-endpoint.com/webhook">
        </div>
        <div class="form-group">
          <label for="api-key">API Key:</label>
          <input type="password" id="api-key" placeholder="Your API Key">
        </div>
      </div>
      
      <div id="smtp-settings" class="settings-panel" style="display: none;">
        <h3>SMTP 邮件设置</h3>
        <div class="form-group">
          <label for="smtp-host">SMTP 服务器:</label>
          <input type="text" id="smtp-host" placeholder="smtp.example.com">
        </div>
        <div class="form-group">
          <label for="smtp-port">端口:</label>
          <input type="number" id="smtp-port" value="587">
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="smtp-secure">
            使用 SSL/TLS
          </label>
        </div>
        <div class="form-group">
          <label for="smtp-username">用户名:</label>
          <input type="text" id="smtp-username">
        </div>
        <div class="form-group">
          <label for="smtp-password">密码:</label>
          <input type="password" id="smtp-password">
        </div>
        <div class="form-group">
          <label for="smtp-from">发件人:</label>
          <input type="email" id="smtp-from" placeholder="from@example.com">
        </div>
        <div class="form-group">
          <label for="smtp-to">收件人:</label>
          <input type="email" id="smtp-to" placeholder="to@example.com">
        </div>
      </div>
    </section>
    
    <section class="poll-section">
      <h2>轮询设置</h2>
      <div class="form-group">
        <label for="poll-interval">检查间隔 (分钟):</label>
        <input type="number" id="poll-interval" min="1" max="60" value="5">
      </div>
    </section>
    
    <section class="actions">
      <button id="save-settings" class="btn btn-primary">保存设置</button>
      <button id="check-now" class="btn btn-secondary">立即检查</button>
    </section>
    
    <footer>
      <div id="status" class="status"></div>
    </footer>
  </div>
  
  <script src="../popup/popup.js"></script>
</body>
</html>
